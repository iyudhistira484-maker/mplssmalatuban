<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login Siswa — SMAN 5 Tuban MPLS</title>
<link rel="icon" href="logo.png" type="image/svg+xml" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="fx.css" />
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-side">
    <a href="../index.html" class="auth-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke beranda</a>
    <div class="brand">
      <img src="logo.png" alt="SMAN 5 Tuban" class="brand-logo" width="40" height="40" style="object-fit:contain;display:block" />
      <div class="brand-text"><strong>SMAN 5 TUBAN</strong><span>MPLS 2025</span></div>
    </div>
    <div class="auth-pitch">
      <h2>Selamat datang kembali.</h2>
      <p>Masuk untuk melanjutkan perjalanan MPLS-mu — materi, soal, dan kegiatan menanti.</p>
    </div>
    <small style="color:#8c9ab9">© 2025 SMA Negeri 5 Tuban</small>
  </aside>

  <main class="auth-form-wrap">
    <form class="auth-form" id="formLogin">
      <h1>Login Siswa</h1>
      <p class="sub">Gunakan email & password yang telah didaftarkan.</p>

      <div class="field">
        <label>Email</label>
        <div class="ctrl"><i class="fa-solid fa-envelope"></i><input type="email" name="email" placeholder="kamu@email.com" required></div>
        <span class="err"></span>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="ctrl"><i class="fa-solid fa-lock"></i><input type="password" name="password" placeholder="Password" required></div>
        <span class="err"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnLogin"><i class="fa-solid fa-right-to-bracket"></i> Masuk</button>

      <p class="auth-foot">Belum punya akun? <a href="register.html">Daftar di sini</a></p>
      <p class="auth-foot" style="margin-top:6px"><a href="admin-login.html" style="color:var(--muted)"><i class="fa-solid fa-user-shield"></i> Login sebagai Admin</a></p>
    </form>
  </main>
</div>

<div id="toast-root"></div>
<script src="ui.js"></script>
<script type="module">
import { loginEmail, getUserProfile } from './auth.js';
const { toast, btnLoading } = window.MPLSUI;

document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const btn = document.getElementById('btnLogin');
  btnLoading(btn, true, 'Memverifikasi...');
  try {
    const user = await loginEmail(fd.get('email'), fd.get('password'));
    const profile = await getUserProfile(user.uid);
    if (!profile || profile.role !== 'student') {
      toast('Akun ini bukan akun siswa.', { type: 'error' });
      const { logout } = await import('./auth.js'); await logout();
      btnLoading(btn, false); return;
    }
    toast('Login berhasil.', { type: 'success' });
    try {
      const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const { db } = await import('./firebase-config.js');
      const today = new Date().toISOString().slice(0,10);
      const attSnap = await getDoc(doc(db, 'attendance', `${user.uid}_${today}`));
      if (attSnap.exists() && attSnap.data().status === 'hadir') {
        setTimeout(() => location.href = 'student.html', 600);
      } else {
        setTimeout(() => location.href = 'attendance.html', 800);
      }
    } catch(_) {
      setTimeout(() => location.href = 'attendance.html', 800);
    }
  } catch (err) {
    btnLoading(btn, false);
    let msg = 'Email atau password salah.';
    if (err.message.includes('user-not-found')) msg = 'Email belum terdaftar. Silakan daftar dulu.';
    toast(msg, { type: 'error' });
  }
});
</script>
<script src="fx.js" defer></script>
</body>
</html>
