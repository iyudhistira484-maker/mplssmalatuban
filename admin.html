<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Admin — SMAN 5 Tuban MPLS</title>
<link rel="icon" href="logo.png" type="image/svg+xml" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="fx.css" />
<link rel="stylesheet" href="polish.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar admin" id="sb">
    <div class="sb-head">
      <img src="logo.png" alt="SMAN 5 Tuban" class="brand-logo" width="40" height="40" style="object-fit:contain;display:block" />
      <div class="brand-text"><strong>SMAN 5 TUBAN</strong><span style="color:var(--gold-2)">ADMIN PANEL</span></div>
    </div>
    <div class="sb-section">DASHBOARD</div>
    <nav class="sb-nav">
      <a class="sb-link active" data-page="overview"><i class="fa-solid fa-gauge-high"></i> Ringkasan</a>
    </nav>
    <div class="sb-section">KELOLA KONTEN</div>
    <nav class="sb-nav">
      <a class="sb-link" data-page="soal"><i class="fa-solid fa-file-pen"></i> Soal</a>
      <a class="sb-link" data-page="materi"><i class="fa-solid fa-book-open"></i> Materi</a>
      <a class="sb-link" data-page="jadwal"><i class="fa-solid fa-calendar-days"></i> Jadwal</a>
      <a class="sb-link" data-page="kegiatan"><i class="fa-solid fa-flag-checkered"></i> Kegiatan</a>
    </nav>
    <div class="sb-section">DATA SISWA</div>
    <nav class="sb-nav">
      <a class="sb-link" data-page="jawaban"><i class="fa-solid fa-clipboard-check"></i> Jawaban Siswa</a>
      <a class="sb-link" data-page="absensi"><i class="fa-solid fa-location-dot"></i> Absensi & Analitik</a>
      <a class="sb-link" data-page="audit"><i class="fa-solid fa-shield-halved"></i> Audit Log</a>
      <a class="sb-link" data-page="rating"><i class="fa-solid fa-star"></i> Rating OSIS</a>
      <a class="sb-link" data-page="export"><i class="fa-solid fa-file-csv"></i> Export Nilai (CSV)</a>
    </nav>
    <div class="sb-foot">
      <div class="sb-user">
        <div class="av" id="avInit">A</div>
        <div><strong id="uName">Admin</strong><span>Administrator</span></div>
      </div>
      <button class="btn btn-ghost btn-block" id="btnLogout" style="margin-top:10px;color:#cfd8eb"><i class="fa-solid fa-arrow-right-from-bracket"></i> Keluar</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="icon-btn sb-toggle"><i class="fa-solid fa-bars"></i></button>
      <h1 id="pageTitle">Ringkasan</h1>
      <div class="top-actions">
        <span class="badge gold"><i class="fa-solid fa-user-shield"></i> Admin Mode</span>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-back" id="modal"><div class="modal" id="modalBox"></div></div>

<div id="toast-root"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="ui.js"></script>
<script type="module" src="admin.js"></script>
<script src="fx.js" defer></script>
</body>
</html>
